app = "jardiyn"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[http_service.checks]
  [http_service.checks.health]
    path = "/health"
    interval = "30s"
    timeout = "5s"

# Set the secret before deploying:
#   fly secrets set ANTHROPIC_API_KEY=sk-ant-...
[env]
  NODE_ENV = "production"
