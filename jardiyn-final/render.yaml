services:
  - type: web
    name: jardiyn
    env: node
    rootDir: jardiyn-final          # package.json lives here, not at repo root
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false                 # Set this manually in Render dashboard
      - key: NODE_ENV
        value: production
      - key: LIVE_APIS
        value: "true"              # Enable real USDA/NOAA/SoilGrids calls (all free, no keys)
      - key: NODE_VERSION
        value: "22"                # node:sqlite persistence requires Node 22+
    healthCheckPath: /health
    autoDeploy: true
