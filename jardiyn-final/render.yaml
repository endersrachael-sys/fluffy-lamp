services:
  - type: web
    name: jardiyn
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false          # Set this manually in Render dashboard
      - key: NODE_ENV
        value: production
      - key: LIVE_APIS
        value: "true"        # Enable real USDA/NOAA/SoilGrids calls (all free, no keys)
    healthCheckPath: /health
    autoDeploy: true
